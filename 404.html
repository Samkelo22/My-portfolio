<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Page not found</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main style="min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding: var(--space-6);">
    <div>
      <span class="eyebrow">Error 404</span>
      <h1 style="margin-top: var(--space-3);">Page not found</h1>
      <p style="color: var(--color-text-muted); margin-top: var(--space-3);">The page you were looking for doesn't exist.</p>
      <a class="btn btn-primary" href="/" style="margin-top: var(--space-5);">Go home <span class="arrow">→</span></a>
    </div>
  </main>
</body>
</html>
